<html lang="ar" dir="rtl">
<head>

<title>IT312 Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.tf-card:hover,.ch.tf:hover{border-color:#fbbf24}
.ch.tf .name{color:#fbbf24}
.lbl.tf{background:#2a1f00;color:#fbbf24}
.fill.tf{background:linear-gradient(90deg,#d97706,#fbbf24)}

body{font-family:system-ui,sans-serif;background:#0f0f13;color:#e8e8f0;min-height:100vh}
#home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#7c6af7,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:.3rem}
.sub{color:#8888a8;font-size:.82rem;text-align:center;margin-bottom:1.8rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:460px}
.ch{background:#1e1e28;border:1.5px solid #2a2a38;border-radius:16px;padding:1.1rem .8rem;text-align:center;cursor:pointer;transition:border-color .2s,transform .15s;user-select:none;-webkit-user-select:none}
.ch:active{transform:scale(.96)}
.ch .icon{font-size:1.9rem;margin-bottom:.4rem}
.ch .name{font-size:.9rem;font-weight:600;margin-bottom:.15rem}
.ch .cnt{font-size:.7rem;color:#8888a8}
.js .name{color:#a78bfa}.js:hover{border-color:#a78bfa}
.dom .name{color:#fb923c}.dom:hover{border-color:#fb923c}
.rx .name{color:#4ade80}.rx:hover{border-color:#4ade80}
.ls .name{color:#38bdf8}.ls:hover{border-color:#38bdf8}
.cs .name{color:#c084fc}.cs:hover{border-color:#c084fc}
.rw .name{color:#f97316}.rw:hover{border-color:#f97316}
#quiz{display:none;padding:.9rem}
.qhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-direction:row-reverse}
.back{background:#1e1e28;border:1px solid #2a2a38;color:#8888a8;border-radius:99px;padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:inherit}
.lbl{font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:99px}
.lbl.js{background:#1a1a3a;color:#a78bfa}.lbl.dom{background:#2a1a0a;color:#fb923c}
.lbl.rx{background:#0d2318;color:#4ade80}.lbl.ls{background:#0a1a2a;color:#38bdf8}
.lbl.cs{background:#1a1030;color:#c084fc}.lbl.rw{background:#2a1a0a;color:#f97316}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.7rem}
.st{background:#1e1e28;border-radius:10px;padding:.5rem;text-align:center}
.sn{font-size:1.1rem;font-weight:600;color:#7c6af7}.sn.g{color:#22c55e}.sn.r{color:#ef4444}
.sl{font-size:.63rem;color:#8888a8;margin-top:2px}
.prog{background:#1e1e28;border-radius:10px;padding:.6rem .9rem;margin-bottom:.9rem}
.pr{display:flex;justify-content:space-between;font-size:.72rem;color:#8888a8;margin-bottom:.3rem}
.track{background:#2a2a38;border-radius:99px;height:5px;overflow:hidden}
.fill{height:5px;border-radius:99px;transition:width .3s;width:0%}
.fill.js{background:linear-gradient(90deg,#7c6af7,#a78bfa)}
.fill.dom{background:linear-gradient(90deg,#f97316,#fb923c)}
.fill.rx{background:linear-gradient(90deg,#22c55e,#4ade80)}
.fill.ls{background:linear-gradient(90deg,#0ea5e9,#38bdf8)}
.fill.cs{background:linear-gradient(90deg,#9333ea,#c084fc)}
.fill.rw{background:linear-gradient(90deg,#ea580c,#f97316)}
.sec{text-align:center;color:#555588;font-size:.68rem;margin:1rem 0 .5rem;display:flex;align-items:center;gap:8px}
.sec::before,.sec::after{content:"";flex:1;height:1px;background:#2a2a38}
.card{background:#1e1e28;border-radius:13px;padding:.9rem;margin-bottom:.8rem;border:1px solid #2a2a38}
.card.ok{border-color:#22c55e}.card.bad{border-color:#ef4444}
.badge{display:inline-block;font-size:.64rem;padding:2px 7px;border-radius:99px;margin-bottom:.45rem;font-weight:500}
.qt{font-size:.88rem;line-height:1.6;margin-bottom:.65rem}
pre{font-family:monospace;background:#080810;border:1px solid #2a2a38;border-radius:7px;padding:.6rem;font-size:.7rem;direction:ltr;text-align:left;overflow-x:auto;margin-bottom:.65rem;line-height:1.5;color:#c9d1d9;white-space:pre-wrap;word-break:break-word}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{background:#17171e;border:1px solid #2a2a38;border-radius:9px;padding:.65rem .85rem;font-size:.85rem;color:#e8e8f0;display:flex;align-items:flex-start;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.opt.ok{border-color:#22c55e!important;background:#0d2318!important;color:#4ade80!important}
.opt.bad{border-color:#ef4444!important;background:#250d0d!important;color:#f87171!important}
.opt.show{border-color:#22c55e!important;background:#0d2318!important;color:#4ade80!important}
.opt.dim{opacity:.35;pointer-events:none}
.lt{width:21px;height:21px;min-width:21px;border-radius:50%;background:#2a2a38;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:700;font-family:monospace;flex-shrink:0;margin-top:1px}
.exp{display:none;margin-top:.6rem;padding:.6rem .8rem;border-radius:7px;font-size:.8rem;line-height:1.55}
.exp.ok{background:#0d2318;border:1px solid #22c55e44;color:#4ade80}
.exp.bad{background:#250d0d;border:1px solid #ef444444;color:#f87171}
.banner{display:none;position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#1a1a25;border:1px solid #7c6af7;border-radius:14px;padding:1.1rem 1.8rem;text-align:center;z-index:99;min-width:240px;box-shadow:0 8px 28px rgba(0,0,0,.8)}
.bsc{font-size:1.9rem;font-weight:700;background:linear-gradient(135deg,#7c6af7,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bmsg{color:#8888a8;font-size:.8rem;margin-top:.25rem}
.bbtns{display:flex;gap:8px;margin-top:.75rem}
.rb,.hb{border:none;border-radius:8px;padding:.45rem .9rem;font-family:inherit;font-size:.82rem;cursor:pointer;flex:1}
.rb{background:#2a2a38;color:#e8e8f0}.hb{background:#7c6af722;color:#a78bfa;border:1px solid #7c6af744}
</style>
</head>

var cur=null,ans=0,cor=0,wr=0,tot=0;
var L=["A","B","C","D"];
function mk(t,c){var e=document.createElement(t);if(c)e.className=c;return e;}
function go(ch){
  cur=ch; ans=cor=wr=0;
  var d=D[ch]; tot=d.qs.length;
  document.getElementById("sq").textContent=tot;
  document.getElementById("sa").textContent=0;
  document.getElementById("sc").textContent=0;
  document.getElementById("sw").textContent=0;
  document.getElementById("pt").textContent="0/"+tot;
  var pf=document.getElementById("pf");
  pf.style.width="0%"; pf.className="fill "+d.cl;
  var lbl=document.getElementById("qlbl");
  lbl.textContent=d.cl.toUpperCase();
  lbl.className="lbl "+d.cl;
  document.getElementById("banner").style.display="none";
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="block";
  build(d); window.scrollTo(0,0);
}
function build(d){
  var root=document.getElementById("root"); root.textContent="";
  d.secs.forEach(function(sec){
    var st=mk("div","sec"); st.textContent=sec.t; root.appendChild(st);
    sec.ids.forEach(function(id){
      var q=null;
      for(var i=0;i<d.qs.length;i++){if(d.qs[i].id===id){q=d.qs[i];break;}}
      if(!q)return;
      var card=mk("div","card"); card.id="c-"+id;
      var badge=mk("div","badge");
      badge.style.background=q.isnew?"#0d2318":"#1e1428";
      badge.style.color=q.yrc;
      badge.textContent=q.yr;
      card.appendChild(badge);
      var qt=mk("div","qt"); qt.textContent=q.q; card.appendChild(qt);
      if(q.code){var pre=mk("pre");pre.textContent=q.code;card.appendChild(pre);}
      var od=mk("div","opts"); od.id="o-"+id;
      q.opts.forEach(function(o,i){
        var opt=mk("div","opt");
        opt.setAttribute("data-q",id); opt.setAttribute("data-i",i);
        var lt=mk("div","lt"); lt.textContent=L[i];
        var sp=mk("span"); sp.textContent=o;
        opt.appendChild(lt); opt.appendChild(sp);
        function handler(){doAns(this.getAttribute("data-q"),parseInt(this.getAttribute("data-i")));}
        opt.addEventListener("click",handler,false);
        opt.addEventListener("touchend",function(e){e.preventDefault();handler.call(this);},false);
        od.appendChild(opt);
      });
      card.appendChild(od);
      var exp=mk("div","exp"); exp.id="e-"+id; card.appendChild(exp);
      root.appendChild(card);
    });
  });
}
function doAns(qid,idx){
  var card=document.getElementById("c-"+qid);
  if(card.getAttribute("data-done"))return;
  card.setAttribute("data-done","1");
  var d=D[cur]; var q=null;
  for(var i=0;i<d.qs.length;i++){if(d.qs[i].id===qid){q=d.qs[i];break;}}
  var ok=idx===q.ans;
  var ao=document.getElementById("o-"+qid).children;
  for(var i=0;i<ao.length;i++){
    ao[i].style.pointerEvents="none";
    if(i===q.ans) ao[i].className="opt show";
    else if(i===idx&&!ok) ao[i].className="opt bad";
    else ao[i].className="opt dim";
  }
  var exp=document.getElementById("e-"+qid); exp.style.display="block";
  if(ok){
    card.className="card ok"; exp.className="exp ok";
    exp.textContent="صح! "+q.exp;
    cor++; document.getElementById("sc").textContent=cor;
  } else {
    card.className="card bad"; exp.className="exp bad";
    exp.textContent="غلط. الجواب: "+L[q.ans]+" - "+q.exp;
    wr++; document.getElementById("sw").textContent=wr;
  }
  ans++;
  document.getElementById("sa").textContent=ans;
  document.getElementById("pt").textContent=ans+"/"+tot;
  document.getElementById("pf").style.width=(ans/tot*100)+"%";
  if(ans===tot) result();
}
function result(){
  var p=Math.round(cor/tot*100);
  document.getElementById("bsc").textContent=cor+" / "+tot;
  document.getElementById("bmsg").textContent=p>=90?"ممتاز! جاهز للفاينل":p>=70?"كويس - راجع الغلطات":p>=50?"ركز على الاسئلة الحمراء":"كرر وحاول مجددا";
  document.getElementById("banner").style.display="block";
}
function goHome(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("home").style.display="flex";
  document.getElementById("banner").style.display="none";
  window.scrollTo(0,0);
}
function retry(){
  ans=cor=wr=0;
  document.getElementById("sa").textContent=0;
  document.getElementById("sc").textContent=0;
  document.getElementById("sw").textContent=0;
  document.getElementById("pt").textContent="0/"+tot;
  document.getElementById("pf").style.width="0%";
  document.getElementById("banner").style.display="none";
  build(D[cur]); window.scrollTo(0,0);
}
</script>
